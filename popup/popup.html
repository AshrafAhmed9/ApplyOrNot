<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ApplyOrNot</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="pop-header">
    <div class="pop-title-row">
      <div class="pop-title">ApplyOrNot</div>
      <label class="overlay-switch" title="Show the verdict overlay on job pages">
        <span class="overlay-switch-label">Overlay</span>
        <input type="checkbox" id="toggle-overlay" checked />
        <span class="switch-track"><span class="switch-thumb"></span></span>
      </label>
    </div>
  </header>

  <main>
    <section id="profile-section">
      <div id="profile-card" hidden>
        <div class="pc-top">
          <span class="pc-label" id="pc-filename"></span>
          <span class="pc-level" id="pc-level"></span>
        </div>
        <div class="pc-row" id="pc-education"></div>
        <div class="pc-row" id="pc-domains"></div>
        <label class="field-label">Skills detected</label>
        <div id="pc-skills" class="tags"></div>
        <button id="replace-resume-btn" class="secondary-btn replace-btn">Replace resume</button>
      </div>

      <div id="upload-empty">
        <button id="upload-resume-btn" class="primary-btn upload-cta">+ Upload Resume</button>
        <div class="empty-sub">Your resume is read once by AI to build a profile — only that profile (never the raw resume) is sent for each job verdict.</div>
      </div>
      <input id="pdf-file-input" type="file" accept="application/pdf" hidden />
      <div id="upload-status" class="status-line"></div>

      <label class="field-label">Target experience range</label>
      <div class="slider-row">
        <span id="range-label">0 – 1 yrs</span>
      </div>
      <div class="dual-slider">
        <input type="range" id="range-min" min="0" max="15" step="1" value="0" />
        <input type="range" id="range-max" min="0" max="15" step="1" value="1" />
      </div>
    </section>

    <section id="settings-section">
      <label class="field-label">Your own Gemini API key (optional)</label>
      <input id="byok-input" type="password" placeholder="Paste a free key from aistudio.google.com/apikey" />
      <div class="empty-sub">Bypasses the shared daily limit — calls go straight from your browser to Gemini. Leave blank to use the free shared service.</div>
    </section>
  </main>

  <footer class="pop-footer">
    <a href="#" id="rate-link" target="_blank" rel="noopener">⭐ Rate</a>
    <span class="dot">·</span>
    <a href="#" id="feedback-link" target="_blank" rel="noopener">💬 Feedback</a>
  </footer>

  <script src="../lib/pdf.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
