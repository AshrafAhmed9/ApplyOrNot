<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ApplyOrNot</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="pop-header">
    <div class="pop-title-row">
      <div class="pop-title">ApplyOrNot</div>
      <label class="overlay-switch" title="Show the verdict overlay on job pages">
        <span class="overlay-switch-label">Overlay</span>
        <input type="checkbox" id="toggle-overlay" checked />
        <span class="switch-track"><span class="switch-thumb"></span></span>
      </label>
    </div>
  </header>

  <main>
    <section id="tab-resumes">
      <div id="resume-list"></div>

      <div id="upload-form" class="upload-form" hidden>
        <label class="field-label">Detected field</label>
        <select id="domain-select"></select>

        <label class="field-label">Skills detected (edit as needed)</label>
        <div id="skills-tags" class="tags"></div>
        <div class="tag-input-row">
          <input id="new-skill-input" type="text" placeholder="Add a skill…" />
          <button id="add-skill-btn">Add</button>
        </div>

        <label class="field-label">Target experience range</label>
        <div class="slider-row">
          <span id="range-label">0 – 1 yrs</span>
        </div>
        <div class="dual-slider">
          <input type="range" id="range-min" min="0" max="15" step="1" value="0" />
          <input type="range" id="range-max" min="0" max="15" step="1" value="1" />
        </div>

        <label class="field-label">Label</label>
        <input id="resume-label-input" type="text" placeholder="e.g. Backend, AI/ML" />

        <div class="upload-actions">
          <button id="save-resume-btn" class="primary-btn">Save resume</button>
          <button id="cancel-upload-btn" class="secondary-btn">Cancel</button>
        </div>
      </div>

      <button id="upload-resume-btn" class="primary-btn upload-cta">+ Upload Resume</button>
      <input id="pdf-file-input" type="file" accept="application/pdf" hidden />
      <div id="upload-status" class="status-line"></div>
    </section>
  </main>

  <footer class="pop-footer">
    <a href="#" id="rate-link" target="_blank" rel="noopener">⭐ Rate</a>
    <span class="dot">·</span>
    <a href="#" id="feedback-link" target="_blank" rel="noopener">💬 Feedback</a>
  </footer>

  <script src="../lib/pdf.min.js"></script>
  <script src="../lib/experience.js"></script>
  <script src="../lib/matcher.js"></script>
  <script src="../lib/engine.js"></script>
  <script src="popup.js"></script>
</body>
</html>
